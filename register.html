<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Register | SneakStyle</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- HEADER -->

  <header class="header">

    <div class="logo">
      SneakStyle
    </div>

    <nav class="navbar">

      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="cart.html">Cart</a>

    </nav>

  </header>

  <!-- REGISTER -->

  <section class="auth-page">

    <div class="auth-left register-left">

      <div class="auth-overlay"></div>

      <img
        src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=1200&auto=format&fit=crop"
        alt="Sneaker Banner">

      <div class="auth-left-content">

        <span class="auth-tag">
          JOIN SNEAKSTYLE
        </span>

        <h1>
          Create Account.
        </h1>

        <p>
          Discover premium sneakers and modern streetwear collections.
        </p>

      </div>

    </div>

    <div class="auth-right">

      <div class="auth-box">

        <h2>
          Register
        </h2>

        <p>
          Create your premium account.
        </p>

        <form class="auth-form">

          <div class="input-box">

            <label>Full Name</label>

            <input
              type="text"
              placeholder="Enter your name">

          </div>

          <div class="input-box">

            <label>Email</label>

            <input
              type="email"
              placeholder="Enter your email">

          </div>

          <div class="input-box">

            <label>Password</label>

            <input
              type="password"
              placeholder="Create password">

          </div>

          <button type="submit" class="auth-btn">
            Create Account
          </button>

        </form>

        <div class="auth-bottom">

          Already have an account?

          <a href="login.html">
            Login
          </a>

        </div>

      </div>

    </div>

  </section>

</body>

</html>
