<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cart</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">

    <div class="logo">SneakStyle</div>

    <nav class="navbar">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </nav>

  </header>

  <section class="cart-section">

    <div class="section-header">

      <span class="section-tag">SHOPPING CART</span>

      <h2>Your Cart</h2>

    </div>

    <div class="cart-box">

      <div class="cart-item">

        <span>Nike Air Max</span>

        <span>2.500.000đ</span>

      </div>

      <div class="cart-item">

        <span>Adidas Ultraboost</span>

        <span>3.100.000đ</span>

      </div>

      <div class="cart-total">

        <h3>Total</h3>

        <span>5.600.000đ</span>

      </div>

      <button class="checkout-btn">
        Checkout
      </button>

    </div>

  </section>

  <footer>

    <div class="footer-bottom">
      © 2026 SneakStyle. All rights reserved.
    </div>

  </footer>

</body>

</html>
